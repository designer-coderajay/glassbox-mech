<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Glassbox AI">
<title>Glassbox AI</title>
<defs>
  <linearGradient id="gb-frame" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#F0946E"/>
    <stop offset="42%"  stop-color="#E8724A"/>
    <stop offset="100%" stop-color="#0891B2"/>
  </linearGradient>
  <radialGradient id="gb-glass" cx="38%" cy="32%" r="70%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#E8724A" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#050709" stop-opacity="0"/>
  </radialGradient>
  <filter id="gb-glow-o" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gb-glow-b" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gb-glow-s" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Glass fill -->
<rect x="6" y="6" width="88" height="88" rx="13" fill="url(#gb-glass)"/>
<!-- Frame gradient -->
<rect x="6" y="6" width="88" height="88" rx="13" fill="none" stroke="url(#gb-frame)" stroke-width="2.4"/>
<!-- Corner accents -->
<circle cx="6"  cy="6"  r="1.6" fill="#F0946E" opacity="0.55"/>
<circle cx="94" cy="6"  r="1.6" fill="#0891B2"  opacity="0.55"/>
<circle cx="94" cy="94" r="1.6" fill="#E8724A"  opacity="0.45"/>
<circle cx="6"  cy="94" r="1.6" fill="#38BDF8"  opacity="0.40"/>

<!-- Circuit traces -->
<!-- Top ← Left (orange gradient) -->
<path d="M 50 15 C 42 21, 23 33, 16 50" fill="none"
      stroke="#E8724A" stroke-width="1.55" stroke-linecap="round" opacity="0.80"/>
<!-- Top ← Right (orange → blue) -->
<path d="M 50 15 C 58 21, 77 33, 84 50" fill="none"
      stroke="#0891B2" stroke-width="1.55" stroke-linecap="round" opacity="0.78"/>
<!-- Left ← Bottom (orange → cyan) -->
<path d="M 16 50 C 23 67, 38 79, 50 85" fill="none"
      stroke="#E8724A" stroke-width="1.38" stroke-linecap="round" opacity="0.68"/>
<!-- Right ← Bottom (blue → cyan) -->
<path d="M 84 50 C 77 67, 62 79, 50 85" fill="none"
      stroke="#0891B2" stroke-width="1.38" stroke-linecap="round" opacity="0.68"/>
<!-- S-inhibition arc (dashed, cyan) -->
<path d="M 16 50 C 30 40, 70 40, 84 50" fill="none"
      stroke="#38BDF8" stroke-width="0.85" stroke-dasharray="2.8 2.4"
      stroke-linecap="round" opacity="0.38"/>

<!-- Mid-trace accent knots -->
<circle cx="29" cy="29" r="1.4" fill="#E8724A" opacity="0.52"/>
<circle cx="71" cy="29" r="1.4" fill="#0891B2"  opacity="0.52"/>

<!-- Node: bottom input (cyan) -->
<circle cx="50" cy="85" r="5.5" fill="#38BDF8" filter="url(#gb-glow-s)" opacity="0.88"/>
<circle cx="50" cy="85" r="2.0" fill="#E0F4FF" opacity="0.92"/>

<!-- Node: left S-inhibition (orange) -->
<circle cx="16" cy="50" r="7.0" fill="#E8724A" filter="url(#gb-glow-s)"/>
<circle cx="16" cy="50" r="2.7" fill="#F5B799" opacity="0.90"/>

<!-- Node: right name mover (blue) -->
<circle cx="84" cy="50" r="7.0" fill="#0891B2" filter="url(#gb-glow-s)"/>
<circle cx="84" cy="50" r="2.7" fill="#93D4EC" opacity="0.90"/>

<!-- Node: top primary L9H9 (largest, orange, full glow) -->
<circle cx="50" cy="15" r="10.0" fill="#E8724A" filter="url(#gb-glow-o)"/>
<circle cx="50" cy="15" r="4.0"  fill="#F0946E"/>
<circle cx="50" cy="15" r="1.6"  fill="#ffffff" opacity="0.96"/>
</svg>