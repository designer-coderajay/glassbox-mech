name: Deploy to Vercel (Production)

# Deploys docs/ (static site) to Vercel on every push to main.
# Uses Vercel CLI directly — more reliable than third-party actions.
#
# One-time setup required — add these GitHub Secrets:
#   VERCEL_TOKEN      → https://vercel.com/account/tokens
#   VERCEL_ORG_ID     → team_lKQMS6ZfVVe1y9KXXN7Kt6jJ
#   VERCEL_PROJECT_ID → prj_Am5pxHcNUDNAiTwR2hAJl9HFEnf2

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "vercel.json"
      - ".github/workflows/deploy_vercel.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: Production
      url: https://project-gu05p.vercel.app

    permissions:
      deployments: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest --quiet

      - name: Check VERCEL_TOKEN availability
        id: token-check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::VERCEL_TOKEN not set — skipping Vercel deploy."
          fi

      - name: Deploy to Vercel
        if: steps.token-check.outputs.available == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Deploy from repo root — vercel.json sets outputDirectory: "docs"
          # VERCEL_ORG_ID + VERCEL_PROJECT_ID link the CLI to existing project.
          vercel --prod --yes --token=$VERCEL_TOKEN
          echo "Deployed → https://project-gu05p.vercel.app"
