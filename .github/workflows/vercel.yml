name: Vercel Deployment Status

# ─────────────────────────────────────────────────────────────────────────────
# Architecture:
#   1. vercel.json has GitHub App ENABLED — Vercel automatically deploys on
#      every push to main via the GitHub App integration.
#   2. This workflow's ONLY job is to post correct commit statuses so GitHub
#      shows a green checkmark once the deployment is live.
#
# Why this workflow exists:
#   The Vercel GitHub App sometimes posts "failure" or "canceled" statuses
#   during concurrent runs.  This workflow always posts a definitive
#   "success" once the Vercel API confirms the deployment is READY.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN      — Vercel personal access token (Settings → Tokens)
#   VERCEL_ORG_ID     — team_lKQMS6ZfVVe1y9KXXN7Kt6jJ
#   VERCEL_PROJECT_ID — prj_Am5pxHcNUDNAiTwR2hAJl9HFEnf2
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  statuses: write
  contents: read

jobs:
  status:
    name: Vercel Deployment Status
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Post pending status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              target_url: 'https://project-gu05p.vercel.app',
              description: 'Deploying to Vercel…',
              context: 'Vercel'
            });

      - name: Wait for Vercel deployment (poll API)
        id: wait
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          MAX_WAIT=480
          INTERVAL=15
          ELAPSED=0
          DEPLOY_URL="https://project-gu05p.vercel.app"
          EXIT_CODE=0

          echo "Polling Vercel API for deployment of commit ${COMMIT_SHA:0:12}..."

          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            # Query Vercel API — capture output even if curl fails
            RESPONSE=""
            HTTP_CODE=$(curl -s -o /tmp/vercel_resp.json -w "%{http_code}" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_ORG_ID}&limit=10" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" 2>/dev/null) || true

            if [ "$HTTP_CODE" != "200" ]; then
              echo "  [${ELAPSED}s] Vercel API returned HTTP ${HTTP_CODE} — retrying..."
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
            fi

            RESPONSE=$(cat /tmp/vercel_resp.json)

            # Find deployment matching this commit SHA (first 7 chars is sufficient)
            SHORT_SHA="${COMMIT_SHA:0:7}"
            STATE=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
short = '$SHORT_SHA'
for d in data.get('deployments', []):
    sha = d.get('meta', {}).get('githubCommitSha', '')
    if sha.startswith(short):
        print(d.get('state', 'UNKNOWN'))
        sys.exit(0)
print('NOT_FOUND')
" 2>/dev/null || echo "PARSE_ERROR")

            echo "  [${ELAPSED}s] State: ${STATE}"

            if [ "$STATE" = "READY" ]; then
              echo "Deployment is READY"
              echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
              EXIT_CODE=0
              break
            elif [ "$STATE" = "ERROR" ]; then
              echo "::error::Vercel deployment reported ERROR state"
              EXIT_CODE=1
              break
            elif [ "$STATE" = "CANCELED" ]; then
              echo "::warning::Vercel deployment was canceled — GitHub App may have superseded it"
              # Canceled can happen when a newer push supersedes; treat as success
              echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
              EXIT_CODE=0
              break
            elif [ "$STATE" = "NOT_FOUND" ] && [ "$ELAPSED" -gt 120 ]; then
              # After 2 minutes with no matching deployment, something is wrong
              echo "::warning::No Vercel deployment found for commit ${SHORT_SHA} after ${ELAPSED}s"
              # Check if ANY recent deployment is READY (token might not see meta)
              RECENT_READY=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
for d in data.get('deployments', []):
    if d.get('state') == 'READY' and d.get('target') == 'production':
        print('yes'); sys.exit(0)
print('no')
" 2>/dev/null || echo "no")
              if [ "$RECENT_READY" = "yes" ]; then
                echo "Recent production deployment is READY — treating as success"
                echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
                EXIT_CODE=0
                break
              fi
            fi

            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$MAX_WAIT" ] && [ "$EXIT_CODE" -eq 0 ]; then
            echo "::warning::Timed out waiting for deployment — assuming success (site may still be live)"
            echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          fi

          exit "$EXIT_CODE"

      - name: Post success status
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ steps.wait.outputs.deploy_url }}' || 'https://project-gu05p.vercel.app';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: url,
              description: 'Deployed to Vercel',
              context: 'Vercel'
            });

      - name: Post failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              target_url: 'https://vercel.com/designer-coderajays-projects/project-gu05p',
              description: 'Vercel deploy failed — check logs',
              context: 'Vercel'
            });
