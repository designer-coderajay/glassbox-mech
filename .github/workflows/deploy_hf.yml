name: Deploy to HuggingFace Space

# ──────────────────────────────────────────────────────────────────────────────
# Syncs dashboard/app.py + glassbox library → HuggingFace Space on push to main.
# Uses huggingface_hub Python API (upload_folder) — no git LFS needed.
#
# One-time setup required:
#   1. Go to https://huggingface.co/settings/tokens
#   2. Create a token with "write" scope
#   3. Go to GitHub repo → Settings → Secrets and variables → Actions
#   4. Add secret named:  HF_TOKEN  (paste the HF token)
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "dashboard/app.py"
      - "glassbox/**"
      - ".github/workflows/deploy_hf.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Sync to HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.22.0" --quiet

      - name: Check HF_TOKEN availability
        id: token-check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::HF_TOKEN not set — skipping HuggingFace deploy."
          fi

      - name: Build Space payload
        if: steps.token-check.outputs.available == 'true'
        run: |
          mkdir -p hf_payload
          cp dashboard/app.py hf_payload/app.py

          SHORT_SHA=$(git rev-parse --short HEAD)

          cat > hf_payload/requirements.txt << 'REQS'
          gradio>=4.43.0,<5.0
          numpy>=1.24.0
          scipy>=1.9.0
          matplotlib>=3.7.0
          Pillow>=9.0.0
          transformer-lens>=1.19.0
          glassbox-mech-interp>=4.2.4
          torch>=2.3.0
          einops>=0.6.1
          fancy_einsum>=0.0.3
          jaxtyping>=0.2.20
          REQS

          cat > hf_payload/README.md << RDME
          ---
          title: Glassbox AI
          emoji: 🔬
          colorFrom: indigo
          colorTo: blue
          sdk: gradio
          sdk_version: "4.43.0"
          app_file: app.py
          pinned: false
          python_version: "3.11"
          ---

          # Glassbox AI — EU AI Act Annex IV Compliance

          Mechanistic interpretability + EU AI Act Annex IV compliance toolkit.
          One function call generates a regulation-mapped evidence package for any LLM.

          **Version**: 4.2.4 (GitHub @ ${SHORT_SHA})

          **pip install:** \`pip install glassbox-mech-interp\`

          **Website:** https://project-gu05p.vercel.app

          **GitHub:** https://github.com/designer-coderajay/Glassbox-AI-2.0-Mechanistic-Interpretability-tool
          RDME

          echo "Payload built — files:"
          ls -la hf_payload/

      - name: Upload to HuggingFace Space
        if: steps.token-check.outputs.available == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SHORT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 - <<PYEOF
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "designer-coderajay/Glassbox-AI-2.0-Mechanistic-Interpretability-tool"

          api.upload_folder(
              folder_path="hf_payload",
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"deploy: {os.environ.get('COMMIT_MSG','update')} @ {os.environ.get('SHORT_SHA','HEAD')[:7]}",
              ignore_patterns=["*.pyc", "__pycache__"],
          )
          print(f"Space updated: https://huggingface.co/spaces/{repo_id}")
          PYEOF
