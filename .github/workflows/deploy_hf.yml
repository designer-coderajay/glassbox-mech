name: Deploy to HuggingFace Space

# ──────────────────────────────────────────────────────────────────────────────
# Auto-syncs dashboard/app.py → HuggingFace Space on every push to main.
#
# One-time setup required:
#   1. Go to https://huggingface.co/settings/tokens
#   2. Create a token with "write" scope
#   3. Go to GitHub repo → Settings → Secrets and variables → Actions
#   4. Add secret named:  HF_TOKEN  (paste the HF token)
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "dashboard/app.py"
      - "glassbox/**"
      - ".github/workflows/deploy_hf.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Sync dashboard to HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check HF_TOKEN availability
        id: token-check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::HF_TOKEN not set - skipping HuggingFace deploy. Add it in repo Settings > Secrets."
          fi

      - name: Push to HuggingFace Space
        if: steps.token-check.outputs.available == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/designer-coderajay/Glassbox-AI-2.0-Mechanistic-Interpretability-tool" hf_space

          # ── 1. Copy dashboard app ─────────────────────────────────────────
          cp dashboard/app.py hf_space/app.py

          # ── 2. Write Space README with Python 3.11 pinned.
          #       Python 3.13 removed audioop from stdlib; pydub (pulled in by
          #       gradio) fails to import on 3.13. Pinning to 3.11 is the
          #       canonical HF fix — no code changes required.
          cat > hf_space/README.md << 'RDME'
          ---
          title: Glassbox AI
          emoji: 🔬
          colorFrom: blue
          colorTo: blue
          sdk: gradio
          sdk_version: "4.43.0"
          app_file: app.py
          pinned: false
          python_version: "3.11"
          ---

          # Glassbox AI — EU AI Act Annex IV Compliance

          Mechanistic interpretability + EU AI Act Annex IV compliance toolkit.
          One function call generates a regulation-mapped evidence package for any LLM.

          **pip install:** `pip install glassbox-mech-interp`

          **Docs:** https://github.com/designer-coderajay/Glassbox-AI-2.0-Mechanistic-Interpretability-tool
          RDME

          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' hf_space/README.md

          # ── 3. Pin to the exact version that has NaturalLanguageExplainer,
          #       MultiAgentAudit, SteeringVectorExporter, AnnexIVEvidenceVault.
          #       torch CPU-only keeps the HF Space build fast (<5 min).
          cat > hf_space/requirements.txt << 'REQS'
          gradio==4.43.0
          numpy>=1.24.0
          matplotlib>=3.7.0
          Pillow>=9.0.0
          transformer-lens>=1.19.0
          glassbox-mech-interp>=3.5.0
          torch>=2.3.0
          einops>=0.6.1
          fancy_einsum>=0.0.3
          jaxtyping>=0.2.20
          REQS

          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' hf_space/requirements.txt

          # ── 4. Remove stale root-level files that shadow the pip-installed
          #       glassbox package and cause "ModuleNotFoundError" on Space boot.
          cd hf_space

          for stale in __init__.py core.py alignment.py utils.py Dockerfile; do
            if [ -f "$stale" ]; then
              git rm --force --ignore-unmatch "$stale"
              echo "Removed stale file: $stale"
            fi
          done

          # ── 5. Commit and push ────────────────────────────────────────────
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          SHORT_SHA=$(git -C .. rev-parse --short HEAD)
          COMMIT_TITLE=$(git -C .. log -1 --pretty=format:"%s")

          git add app.py requirements.txt README.md
          git add -u

          # Force stage even if nothing staged (touch ensures rebuild on HF)
          if git diff --staged --quiet; then
            touch app.py
            git add app.py
          fi

          git commit -m "deploy: ${COMMIT_TITLE} — GitHub @ ${SHORT_SHA}"
          git push
          echo "HF Space updated from commit ${SHORT_SHA}: ${COMMIT_TITLE}"
