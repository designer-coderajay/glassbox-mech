name: Deploy to HuggingFace Space

# ──────────────────────────────────────────────────────────────────────────────
# Auto-syncs dashboard/app.py → HuggingFace Space on every push to main.
#
# One-time setup required:
#   1. Go to https://huggingface.co/settings/tokens
#   2. Create a token with "write" scope
#   3. Go to GitHub repo → Settings → Secrets and variables → Actions
#   4. Add secret named:  HF_TOKEN  (paste the HF token)
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "dashboard/app.py"
      - ".github/workflows/deploy_hf.yml"

jobs:
  deploy:
    name: Sync dashboard → HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check HF_TOKEN availability
        id: token-check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::HF_TOKEN secret not configured — skipping HuggingFace deployment. Add HF_TOKEN in repo Settings → Secrets to enable auto-sync."
          fi

      - name: Push to HuggingFace Space
        if: steps.token-check.outputs.available == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # ── Clone the HF Space (every Space is a git repo) ──────────────────
          git clone \
            "https://user:${HF_TOKEN}@huggingface.co/spaces/designer-coderajay/Glassbox-ai" \
            hf_space

          # ── Copy updated app.py to Space root ───────────────────────────────
          cp dashboard/app.py hf_space/app.py

          # ── Write requirements.txt (Space needs all deps at root) ────────────
          # NOTE: written with echo to avoid heredoc indentation issues
          {
            echo "gradio>=4.0.0"
            echo "numpy>=1.24.0"
            echo "matplotlib>=3.7.0"
            echo "Pillow>=9.0.0"
            echo "transformer-lens>=1.19.0"
            echo "glassbox-mech-interp>=2.6.0"
            echo "torch>=2.0.0"
            echo "einops>=0.6.1"
          } > hf_space/requirements.txt

          # ── Commit and push only if something changed ────────────────────────
          cd hf_space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          SHORT_SHA=$(git -C .. rev-parse --short HEAD)

          git add app.py requirements.txt
          if git diff --staged --quiet; then
            echo "No changes — HF Space already up to date."
          else
            git commit -m "Auto-sync from GitHub @ ${SHORT_SHA}"
            git push
            echo "✅ HF Space updated from commit ${SHORT_SHA}"
          fi
