name: Publish to PyPI

# Triggers on any tag that starts with "v" (e.g. v2.6.0, v3.0.0)
#
# Setup required (one time):
#   1. Go to https://pypi.org/manage/account/token/
#   2. Click "Add API token"
#   3. Name: "glassbox-github-actions"
#   4. Scope: "Project: glassbox-mech-interp"
#   5. Copy the token (starts with "pypi-")
#   6. Go to GitHub repo → Settings → Secrets and variables → Actions
#   7. Click "New repository secret"
#   8. Name: PYPI_API_TOKEN  Value: <paste the token>
#   9. Save

on:
  push:
    # Only trigger on versioned package tags (e.g. v3.0.0, v3.1.0)
    # Excludes action-only tags like v1, v2 which don't carry a new package version
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine --quiet

      - name: Sync version strings across all files
        run: python3 scripts/sync_versions.py --apply

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify metadata (twine check)
        run: python -m twine check dist/*

      - name: Show what was built
        run: ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/glassbox-mech-interp

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false
          skip_existing: true   # gracefully skip if this version already exists on PyPI
