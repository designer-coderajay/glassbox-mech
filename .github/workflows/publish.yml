name: Publish to PyPI

# Triggers on any tag that starts with "v" (e.g. v2.4.2, v3.0.0)
# Uses OIDC Trusted Publisher — no API token required.
#
# One-time setup (already done by repo owner):
#   https://pypi.org/manage/project/glassbox-mech-interp/settings/publishing/
#   → Trusted Publisher settings:
#       Owner:    designer-coderajay
#       Repo:     Glassbox-AI-2.0-Mechanistic-Interpretability-tool
#       Workflow: publish.yml
#       Env:      pypi   ← must match the environment: name below
#
# GitHub repo setup:
#   Settings → Environments → "pypi" environment must exist

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build --quiet

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify metadata (twine check)
        run: |
          pip install twine --quiet
          python -m twine check dist/*

      - name: Show what was built
        run: ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/glassbox-mech-interp

    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publisher

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Verify dist before upload
        run: |
          pip install twine --quiet
          python -m twine check dist/*

      - name: Mint OIDC token + decode Macaroon caveats
        run: |
          python3 << 'PYEOF'
          import os, urllib.request, json, sys, base64, urllib.error

          # Step 1: get GitHub OIDC JWT
          url = os.environ['ACTIONS_ID_TOKEN_REQUEST_URL'] + '&audience=pypi'
          req = urllib.request.Request(url, headers={"Authorization": f"bearer {os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']}"})
          with urllib.request.urlopen(req) as r:
              oidc_token = json.loads(r.read())['value']
          print(f'::notice::GitHub OIDC JWT obtained (len={len(oidc_token)})')

          # Decode the GitHub JWT payload (middle segment) — no signature verify needed
          parts = oidc_token.split('.')
          if len(parts) == 3:
              padded = parts[1] + '=' * (-len(parts[1]) % 4)
              claims = json.loads(base64.urlsafe_b64decode(padded))
              for key in ['sub', 'repository', 'workflow', 'environment', 'job_workflow_ref', 'ref']:
                  val = claims.get(key, '<missing>')
                  print(f'::notice::JWT claim {key}: {val}')

          # Step 2: exchange for PyPI upload token
          body = json.dumps({'token': oidc_token}).encode()
          req2 = urllib.request.Request(
              'https://pypi.org/_/oidc/github/mint-token',
              data=body, headers={'Content-Type': 'application/json'}
          )
          try:
              with urllib.request.urlopen(req2) as r:
                  upload_token = json.loads(r.read())['token']
          except urllib.error.HTTPError as e:
              print(f'::error::mint-token FAILED {e.code}: {e.read().decode()[:400]}')
              sys.exit(1)

          print(f'::notice::Minted token prefix: {upload_token[:20]}...')

          # Step 3: decode Macaroon caveats from the upload token
          # Format: "pypi-" + base64(macaroon_bytes)
          if upload_token.startswith('pypi-'):
              raw = base64.b64decode(upload_token[5:] + '==')
              i = 0
              while i < len(raw):
                  if i + 4 > len(raw):
                      break
                  try:
                      size = int(raw[i:i+4], 16)
                  except ValueError:
                      break
                  if size == 0 or size > len(raw) - i:
                      break
                  packet = raw[i+4:i+size]
                  space = packet.find(b' ')
                  if space >= 0:
                      field = packet[:space].decode('utf-8', errors='replace')
                      value = packet[space+1:].rstrip(b'\n').decode('utf-8', errors='replace')
                      if field in ('location', 'identifier', 'cid'):
                          safe_val = value.replace('\n', ' | ')[:200]
                          print(f'::notice::Macaroon {field}: {safe_val}')
                  i += size

          # Write token to env for next step
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'PYPI_UPLOAD_TOKEN={upload_token}\n')
          PYEOF

      - name: Upload to PyPI via twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_UPLOAD_TOKEN }}
        run: |
          pip install twine --quiet
          set +e
          python -m twine upload --non-interactive --verbose dist/* > twine_out.txt 2>&1
          TWINE_EXIT=$?
          python3 -c "
          import re, sys
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          with open('twine_out.txt') as f:
              for line in f:
                  clean = ansi.sub('', line).rstrip()
                  if clean:
                      print(f'::notice::twine: {clean[:400]}')
          "
          exit $TWINE_EXIT
