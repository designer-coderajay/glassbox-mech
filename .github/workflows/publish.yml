name: Publish to PyPI

# Triggers on any tag that starts with "v" (e.g. v2.4.0, v3.0.0)
# Uses OIDC Trusted Publisher — no API token required.
#
# One-time setup (already done by repo owner):
#   https://pypi.org/manage/project/glassbox-mech-interp/settings/publishing/
#   → Trusted Publisher settings:
#       Owner:    designer-coderajay
#       Repo:     Glassbox-AI-2.0-Mechanistic-Interpretability-tool
#       Workflow: publish.yml
#       Env:      pypi   ← must match the environment: name below
#
# GitHub repo setup:
#   Settings → Environments → "pypi" environment must exist
#   (create it with no protection rules if you haven't yet)

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build --quiet

      - name: Build wheel + sdist
        run: python -m build

      - name: Show what was built
        run: ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # "pypi" must match the Environment name entered in PyPI Trusted Publisher config.
    environment:
      name: pypi
      url: https://pypi.org/p/glassbox-mech-interp

    permissions:
      id-token: write     # OIDC token for PyPI Trusted Publisher
      attestations: write # sigstore package attestations (required by pypa/gh-action-pypi-publish ≥ v1.8)

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          attestations: false   # disable sigstore attestations — avoids permission issues
