name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-tests:
    name: Fast tests (CPU, no model download)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip wheels so dependency install is fast on repeat runs.
      # Key includes pyproject.toml hash so a dep change busts the cache.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      # Cache HuggingFace model weights — GPT-2 is ~500 MB.
      # Key is OS-only (no hash) so it survives pyproject.toml changes.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-gpt2-${{ runner.os }}
          restore-keys: hf-gpt2-

      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show installed versions
        run: pip list | grep -E "torch|transformer.lens|glassbox|pytest|sae"

      # Run tests and always write full output to the job summary so failures
      # are visible without needing admin log access.
      - name: Run fast tests
        run: |
          set +e
          pytest tests/ -v --tb=long -m "not slow" 2>&1 | tee pytest_output.txt
          PYTEST_EXIT=$?
          echo "## Fast Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 pytest_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $PYTEST_EXIT
        timeout-minutes: 20

  mcp-server-check:
    name: MCP server import + tool registration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP server deps (no torch — CPU import check only)
        run: |
          pip install --upgrade pip
          pip install mcp fastmcp pydantic glassbox-mech-interp --quiet

      - name: Verify server imports and all 5 tools register cleanly
        run: |
          python3 - <<'EOF'
          import sys, types

          # Stub torch and transformer_lens so we can import server.py
          # without downloading multi-GB weights on a test runner.
          for mod in ["torch", "transformer_lens", "einops",
                      "fancy_einsum", "jaxtyping"]:
              sys.modules.setdefault(mod, types.ModuleType(mod))

          # Patch torch.cuda stub
          torch_stub = sys.modules["torch"]
          torch_stub.cuda = types.SimpleNamespace(is_available=lambda: False)
          torch_stub.device = str
          torch_stub.float32 = "float32"

          # Import the MCP server
          import importlib.util, pathlib
          spec = importlib.util.spec_from_file_location(
              "glassbox_mcp", pathlib.Path("mcp/server.py"))
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)

          # Verify all expected tools are registered
          expected = {
              "glassbox_circuit_discovery",
              "glassbox_faithfulness_metrics",
              "glassbox_compliance_report",
              "glassbox_attention_patterns",
              "glassbox_logit_lens",
          }
          registered = {t.name for t in mod.mcp._tool_manager.list_tools()}
          missing = expected - registered
          if missing:
              print(f"FAIL — missing tools: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"OK — {len(registered)} tools registered: {sorted(registered)}")
          EOF

      - name: Verify version string is current
        run: |
          CURRENT=$(python3 -c "
          import re; t=open('pyproject.toml').read()
          print(re.search(r'version\s*=\s*\"([^\"]+)\"', t).group(1))")
          grep -q "glassbox-mech-interp v${CURRENT}" mcp/server.py \
            && echo "OK — mcp/server.py references v${CURRENT}" \
            || (echo "FAIL — mcp/server.py has stale version (expected v${CURRENT})" && exit 1)
