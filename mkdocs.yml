site_name: "Glassbox 4.2.6 — Mechanistic Interpretability Toolkit"
site_description: "Open-source circuit discovery, SAE feature attribution, and head composition analysis for transformer language models."
site_author: "Ajay Pravin Mahale"
site_url: "https://designer-coderajay.github.io/glassbox-mech/"

repo_name: "designer-coderajay/glassbox-mech"
repo_url: "https://github.com/designer-coderajay/glassbox-mech"
edit_uri: "blob/main/docs/"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.annotate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_bases: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - API Reference:
      - GlassboxV2: api/core.md
      - SAEFeatureAttributor: api/sae.md
      - HeadCompositionAnalyzer: api/composition.md
      - Type Aliases: api/types.md
      - Utilities: api/utils.md
  - Examples:
      - IOI Circuit Discovery: examples/ioi.md
      - Token Attribution: examples/token-attribution.md
      - Logit Lens: examples/logit-lens.md
      - Head Composition: examples/composition.md
  - Theory:
      - Attribution Patching: theory/attribution-patching.md
      - SAE Features: theory/sae.md
      - Composition Scores: theory/composition.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md
  - Security: SECURITY.md
